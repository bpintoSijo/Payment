<!-- auth/signup.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inscription</title>
        <link rel="stylesheet" th:href="@{/css/transaction-form.css}" />
    </head>
    <body>
    <div class="card">
        <h1>Inscription</h1>

        <div class="error-banner" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/auth/signup}" th:object="${signupRequest}" method="post">
            <div class="field">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" th:field="*{username}" placeholder="john" required />
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:#b91c1c;font-size:0.8rem;"></span>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="john@mail.com" required />
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:#b91c1c;font-size:0.8rem;"></span>
            </div>
            <div class="field">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" th:field="*{password}" placeholder="••••••••" required />
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:#b91c1c;font-size:0.8rem;"></span>
            </div>
            <button type="submit">Créer un compte</button>
        </form>

        <p class="link">Déjà un compte ? <a th:href="@{/auth/login}">Se connecter</a></p>
    </div>
    </body>
</html>
