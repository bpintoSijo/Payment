<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Transaction</title>
    <link rel="stylesheet" th:href="@{/css/transaction-form.css}" />
</head>
<body>
<div class="card">
    <h1>New Transaction</h1>

    <div class="success-banner" th:if="${successPayment}">
        <strong th:text="${successPayment}"></strong>
    </div>

    <form th:action="@{/transactions/new}" th:object="${form}" method="post">
        <div class="field">
            <label for="amount">Amount</label>
            <input type="number" id="amount" th:field="*{amount}" step="0.01" min="0" required />
        </div>

        <div class="field">
            <label for="paymentMethodId">Payment Method</label>
            <select id="paymentMethodId" th:field="*{paymentMethodId}" required>
                <option value="">-- Select a payment method --</option>
                <option th:each="pm : ${paymentMethods}"
                        th:value="${pm.id}"
                        th:text="${pm.type + ' — ' + pm.accountId}">
                </option>
            </select>
        </div>

        <button type="submit">Pay</button>
    </form>
</div>
</body>
</html>
