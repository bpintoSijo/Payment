# ===== Data base =====
spring:
  datasource:
    url: jdbc:h2:file:./data/mydata
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
# ===== Camunda =====
camunda:
  bpm:
    webapp:
      application-path: /camunda
    admin-user:
      id: admin
      password: admin
      first-name: Admin
    auto-deployment-enabled: true
    deployment-resource-pattern: classpath*:processes/*.bpmn
